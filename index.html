<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #f8fafc, #eef2f7);
            font-family: 'Segoe UI', sans-serif;
            color: #374151;
        }

        .sidebar {
            position: fixed;
            width: 240px;
            height: 100vh;
            padding: 28px 18px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-right: 1px solid #e5eaf2;
        }

        .main {
            margin-left: 260px;
            padding: 35px;
        }

        .sidebar h4 {
            color: #6366f1;
            font-weight: 800;
            margin-bottom: 28px;
        }

        .sidebar a {
            display: block;
            text-decoration: none;
            color: #6b7280;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: .25s;
        }

        .sidebar a:hover {
            background: #eef2ff;
            color: #4f46e5;
            transform: translateX(6px);
        }

        .card-custom {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            border: 1px solid #e6ecf5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .form-control,
        .form-select {
            background: #f4f7fb;
            border-radius: 12px;
            border: 1px solid #e1e7ef;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, .15);
            background: #ffffff;
        }

        .btn-primary {
            background: linear-gradient(90deg, #6366f1, #8b92ff);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(99, 102, 241, .25);
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .table-custom {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            border: 1px solid #e6ecf5;
        }

        .text-success {
            color: #22c55e !important;
        }

        .text-danger {
            color: #ef4444 !important;
        }

        .activity-box {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            border: 1px solid #e6ecf5;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        #activity div {
            padding: 6px 0;
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4>SmartNest</h4>
        <a href="index.html">Dashboard</a>
        <a href="tran.html">Transactions</a>
        <a href="bud.html">Budgets</a>
        <a href="goals.html">Goals</a>
    </div>
    <div class="main">
        <h2 class="mb-4">Dashboard</h2>
        <div class="row g-4 mb-4">

            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h6>Total Balance</h6>
                    <h3 id="balance">₹0</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h6>Total Income</h6>
                    <h3 id="income">₹0</h3>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-custom p-3">
                    <h6>Total Expense</h6>
                    <h3 id="expense">₹0</h3>
                </div>
            </div>

        </div>
        <div class="card card-custom p-4 mb-4">

            <h5>Add Transaction</h5>
            <div class="row g-3">

                <div class="col-md-3">
                    <input id="desc" class="form-control" placeholder="Description">
                </div>

                <div class="col-md-2">
                    <input id="amount" type="number" class="form-control" placeholder="Amount">
                </div>

                <div class="col-md-2">
                    <select id="type" class="form-select">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <select id="category" class="form-select">
                        <option>Food</option>
                        <option>Shopping</option>
                        <option>Travel</option>
                        <option>Salary</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <button onclick="addTransaction()" class="btn btn-primary w-100">Add</button>
                </div>

            </div>
        </div>
        <div class="card card-custom p-3 mb-4">
            <canvas id="chart"></canvas>
        </div>
        <div class="card table-custom p-3 mb-4">

            <h5>Recent Transactions</h5>

            <table class="table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>
        <div class="activity-box">
            <h5>Live Activity</h5>
            <div id="activity"></div>
        </div>

    </div>

    <script>
        let data = JSON.parse(localStorage.getItem("transactions")) || [];

        function save() {
            localStorage.setItem("transactions", JSON.stringify(data));
        }
        function logActivity(text) {
            let div = document.createElement("div");
            div.innerHTML = new Date().toLocaleTimeString() + " — " + text;
            document.getElementById("activity").prepend(div);
        }
        function addTransaction() {

            let desc = document.getElementById("desc").value;
            let amount = Number(document.getElementById("amount").value);
            let type = document.getElementById("type").value;
            let category = document.getElementById("category").value;

            if (!desc || !amount) return;

            data.push({ desc, amount, type, category });
            save();

            logActivity(
                (type === "income" ? "Income ₹" : "Expense ₹") +
                amount + " added (" + category + ")"
            );

            update();

            document.getElementById("desc").value = "";
            document.getElementById("amount").value = "";
        }
        function deleteTransaction(i) {
            let t = data[i];

            logActivity("Deleted " + t.desc + " ₹" + t.amount);

            data.splice(i, 1);
            save();
            update();
        }
        function update() {

            let income = 0, expense = 0;
            let list = document.getElementById("list");
            list.innerHTML = "";

            data.forEach((t, i) => {

                if (t.type === "income") income += t.amount;
                else expense += t.amount;

                list.innerHTML += `
<tr>
<td>${t.desc}</td>
<td>${t.category}</td>
<td>${t.type}</td>
<td class="${t.type === "income" ? "text-success" : "text-danger"}">
${t.type === "income" ? "+" : "-"}₹${t.amount}
</td>
<td><button onclick="deleteTransaction(${i})" class="btn btn-sm btn-danger">X</button></td>
</tr>`;
            });

            document.getElementById("income").innerText = "₹" + income;
            document.getElementById("expense").innerText = "₹" + expense;
            document.getElementById("balance").innerText = "₹" + (income - expense);

            drawChart(income, expense);
        }

        let chart;

        function drawChart(income, expense) {

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById("chart"), {
                type: "doughnut",
                data: {
                    labels: ["Income", "Expense"],
                    datasets: [{
                        data: [income, expense],
                        backgroundColor: ["#22c55e", "#ef4444"]
                    }]
                }
            });
        }

        update();

    </script>

</body>

</html>

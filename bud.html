<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8fafc, #eef2f7);
            font-family: 'Segoe UI', sans-serif;
            color: #374151;
        }
        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            padding: 28px 18px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-right: 1px solid #e5eaf2;
        }

        .sidebar h4 {
            font-weight: 800;
            color: #6366f1;
            margin-bottom: 28px;
        }

        .sidebar a {
            display: block;
            padding: 12px 14px;
            margin-bottom: 8px;
            color: #6b7280;
            border-radius: 12px;
            text-decoration: none;
            transition: .25s;
        }

        .sidebar a:hover {
            background: #eef2ff;
            color: #4f46e5;
            transform: translateX(6px);
        }
        .main {
            margin-left: 260px;
            padding: 36px;
        }
        .card-custom {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            border: 1px solid #e6ecf5;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .form-control,
        .form-select {
            background: #f4f7fb;
            border-radius: 12px;
            border: 1px solid #e1e7ef;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, .15);
            background: #ffffff;
        }
        .btn-primary {
            background: linear-gradient(90deg, #6366f1, #7c83ff);
            border: none;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }
        .progress {
            height: 12px;
            background: #e8eef6;
            border-radius: 10px;
        }

        .progress-bar.bg-success {
            background: #22c55e;
        }

        .progress-bar.bg-warning {
            background: #f59e0b;
        }

        .progress-bar.bg-danger {
            background: #ef4444;
        }

        @media(max-width:768px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4>SmartNest</h4>
        <a href="index.html">Dashboard</a>
        <a href="tran.html">Transactions</a>
        <a href="bud.html">Budgets</a>
        <a href="goals.html">Goals</a>
    </div>
    <div class="main">

        <h2 class="mb-4">Budget Planner</h2>

        <div class="card-custom">

            <h5>Add Budget</h5>

            <div class="row g-3">

                <div class="col-md-4">
                    <select id="category" class="form-select">
                        <option>Food</option>
                        <option>Shopping</option>
                        <option>Travel</option>
                        <option>Other</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <input id="amount" type="number" class="form-control" placeholder="Budget amount">
                </div>

                <div class="col-md-4">
                    <button onclick="addBudget()" class="btn btn-primary w-100">
                        Add Budget
                    </button>
                </div>

            </div>
        </div>

        <div id="budgetList"></div>

    </div>

    <script>

        let budgets = JSON.parse(localStorage.getItem("budgets")) || [];
        let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
        function saveBudgets() {
            localStorage.setItem("budgets", JSON.stringify(budgets));
        }

        function addBudget() {

            let category = document.getElementById("category").value;
            let amount = Number(document.getElementById("amount").value);

            if (!amount) return;

            budgets.push({ category, amount });
            saveBudgets();
            renderBudgets();

            document.getElementById("amount").value = "";
        }
        function spentAmount(category) {

            let total = 0;

            transactions.forEach(t => {
                if (t.type === "expense" && t.category === category) {
                    total += t.amount;
                }
            });

            return total;
        }

        function renderBudgets() {

            let container = document.getElementById("budgetList");
            container.innerHTML = "";

            budgets.forEach((b, i) => {

                let spent = spentAmount(b.category);
                let percent = Math.min((spent / b.amount) * 100, 100);

                let barColor =
                    percent > 100 ? "bg-danger" :
                        percent > 80 ? "bg-warning" :
                            "bg-success";

                container.innerHTML += `
<div class="card-custom">

<h5>${b.category}</h5>

<p>Budget: ₹${b.amount} | Spent: ₹${spent}</p>

<div class="progress mb-3">
<div class="progress-bar ${barColor}"
style="width:${percent}%"></div>
</div>

<button onclick="deleteBudget(${i})"
class="btn btn-sm btn-danger">
Delete
</button>

</div>`;
            });

        }
        function deleteBudget(i) {
            budgets.splice(i, 1);
            saveBudgets();
            renderBudgets();
        }
        renderBudgets();

    </script>

</body>

</html>

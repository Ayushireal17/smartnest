<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8fafc, #eef2f7);
            font-family: 'Segoe UI', sans-serif;
            color: #374151;
        }

        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            padding: 28px 18px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-right: 1px solid #e5eaf2;
        }

        .sidebar h4 {
            font-weight: 800;
            color: #6366f1;
            margin-bottom: 28px;
        }

        .sidebar a {
            display: block;
            padding: 12px 14px;
            margin-bottom: 8px;
            color: #6b7280;
            border-radius: 12px;
            text-decoration: none;
            transition: .25s;
        }

        .sidebar a:hover {
            background: #eef2ff;
            color: #4f46e5;
            transform: translateX(6px);
        }

        .main {
            margin-left: 260px;
            padding: 36px;
        }

        .card-custom {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            border: 1px solid #e6ecf5;
            padding: 22px;
            margin-bottom: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .form-control {
            background: #f4f7fb;
            border-radius: 12px;
            border: 1px solid #e1e7ef;
        }

        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, .15);
            background: #ffffff;
        }

        .btn-primary {
            background: linear-gradient(90deg, #6366f1, #7c83ff);
            border: none;
            border-radius: 12px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #4f46e5;
        }

        .btn-success {
            border-radius: 10px;
        }

        .btn-danger {
            border-radius: 10px;
        }

        .progress {
            height: 12px;
            background: #e8eef6;
            border-radius: 10px;
        }

        .progress-bar {
            background: #22c55e;
        }

        @media(max-width:768px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
                padding: 24px;
            }
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h4>SmartNest</h4>
        <a href="index.html">Dashboard</a>
        <a href="tran.html">Transactions</a>
        <a href="bud.html">Budgets</a>
        <a href="goals.html">Goals</a>
    </div>

    <div class="main">
        <h2 class="mb-4">Savings Goals</h2>
        <div class="card-custom">
            <h5>Create Goal</h5>
            <div class="row g-3">
                <div class="col-md-4">
                    <input id="goalName" class="form-control" placeholder="Goal name">
                </div>

                <div class="col-md-4">
                    <input id="goalAmount" type="number" class="form-control" placeholder="Target amount">
                </div>

                <div class="col-md-4">
                    <button onclick="addGoal()" class="btn btn-primary w-100">
                        Add Goal
                    </button>
                </div>

            </div>

        </div>
        <div id="goalList"></div>

    </div>

    <script>
        let goals = JSON.parse(localStorage.getItem("goals")) || [];
        function save() {
            localStorage.setItem("goals", JSON.stringify(goals));
        }
        function addGoal() {

            let name = document.getElementById("goalName").value;
            let amount = Number(document.getElementById("goalAmount").value);

            if (!name || !amount) return;

            goals.push({
                name: name,
                target: amount,
                saved: 0
            });

            save();
            render();

            document.getElementById("goalName").value = "";
            document.getElementById("goalAmount").value = "";
        }
        function addMoney(i) {

            let add = prompt("Enter amount to add:");

            if (!add) return;

            goals[i].saved += Number(add);

            save();
            render();
        }
        function deleteGoal(i) {
            goals.splice(i, 1);
            save();
            render();
        }
        function render() {

            let container = document.getElementById("goalList");
            container.innerHTML = "";

            goals.forEach((g, i) => {

                let percent = Math.min((g.saved / g.target) * 100, 100);

                container.innerHTML += `
<div class="card-custom">

<h5>${g.name}</h5>

<p>Saved: ₹${g.saved} / ₹${g.target} (${percent.toFixed(0)}%)</p>

<div class="progress mb-3">
<div class="progress-bar" style="width:${percent}%"></div>
</div>

<button onclick="addMoney(${i})" class="btn btn-success btn-sm">
Add Money
</button>

<button onclick="deleteGoal(${i})" class="btn btn-danger btn-sm ms-2">
Delete
</button>

</div>`;
            });

        }

        render();

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SmartNest</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #f8fafc, #eef2f7);
            font-family: 'Segoe UI', sans-serif;
            color: #374151;
        }

        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            padding: 28px 18px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border-right: 1px solid #e5eaf2;
        }

        .sidebar h4 {
            font-weight: 800;
            color: #6366f1;
            margin-bottom: 28px;
        }

        .sidebar a {
            display: block;
            padding: 12px 14px;
            margin-bottom: 8px;
            color: #6b7280;
            border-radius: 12px;
            text-decoration: none;
            transition: .25s;
        }

        .sidebar a:hover {
            background: #eef2ff;
            color: #4f46e5;
            transform: translateX(6px);
        }

        .main {
            margin-left: 260px;
            padding: 35px;
        }

        .form-control,
        .form-select {
            background: #f4f7fb;
            border-radius: 12px;
            border: 1px solid #e1e7ef;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, .15);
            background: #ffffff;
        }

        .table-custom {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(14px);
            border-radius: 18px;
            border: 1px solid #e6ecf5;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .table th {
            font-weight: 600;
            color: #6b7280;
            border-bottom: 1px solid #e5eaf2;
        }

        .table td {
            vertical-align: middle;
        }

        .btn-danger {
            border-radius: 10px;
        }

        @media(max-width:768px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h4>SmartNest</h4>
        <a href="index.html">Dashboard</a>
        <a href="tran.html">Transactions</a>
        <a href="bud.html">Budgets</a>
        <a href="goals.html">Goals</a>
    </div>
    <div class="main">

        <h2 class="mb-4">All Transactions</h2>
        <div class="row g-3 mb-4">

            <div class="col-md-6">
                <input id="search" class="form-control" placeholder="Search description..." oninput="render()">
            </div>

            <div class="col-md-3">
                <select id="filter" class="form-select" onchange="render()">
                    <option value="all">All</option>
                    <option value="income">Income</option>
                    <option value="expense">Expense</option>
                </select>
            </div>

        </div>
        <div class="table-custom">

            <table class="table">
                <thead>
                    <tr>
                        <th>Description</th>
                        <th>Category</th>
                        <th>Type</th>
                        <th>Amount</th>
                        <th></th>
                    </tr>
                </thead>

                <tbody id="list"></tbody>

            </table>

        </div>

    </div>

    <script>

        let data = JSON.parse(localStorage.getItem("transactions")) || [];

        function render() {

            let list = document.getElementById("list");
            list.innerHTML = "";

            let search = document.getElementById("search").value.toLowerCase();
            let filter = document.getElementById("filter").value;

            data.forEach((t, i) => {

                if (!t.desc.toLowerCase().includes(search)) return;
                if (filter !== "all" && t.type !== filter) return;

                list.innerHTML += `
<tr>
<td>${t.desc}</td>
<td>${t.category}</td>
<td>${t.type}</td>
<td class="${t.type === "income" ? "text-success" : "text-danger"}">
${t.type === "income" ? "+" : "-"}₹${t.amount}
</td>
<td>
<button onclick="deleteTransaction(${i})"
class="btn btn-sm btn-danger">
Delete
</button>
</td>
</tr>`;
            });

        }

        function deleteTransaction(i) {
            data.splice(i, 1);
            localStorage.setItem("transactions", JSON.stringify(data));
            render();
        }

        render();

    </script>
</body>

</html>
